<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Test Series Menu</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary-color: #00d2ff;
    --secondary-color: #3a7bd5;
    --bg-dark: #0f0f13;
    --card-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #0f0f13, #1a1a2e, #0f0f13, #16213e);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: #ffffff;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h2 {
    font-weight: 600;
    font-size: 28px;
    color: var(--primary-color);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 30px;
    text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
    animation: fadeInDown 0.8s ease-out;
}

.menu-container {
    width: 100%;
    max-width: 450px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-bottom: 50px;
}

/* TEST BOX */
.test-box {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.4s;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.5s ease forwards;
    position: relative;
    overflow: hidden;
}

/* Glow Border */
.test-box::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(120deg, transparent, #00d2ff, transparent);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    opacity: 0;
    transition: 0.4s;
}

.test-box:hover::before {
    opacity: 1;
}

.test-box:hover {
    transform: scale(1.03) rotateX(3deg) rotateY(3deg);
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--primary-color);
}

.test-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.test-icon {
    font-size: 24px;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.test-name {
    font-size: 16px;
    font-weight: 500;
}

/* BADGE */
.badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: linear-gradient(135deg, #00d2ff, #3a7bd5);
    margin-left: 8px;
}

/* BUTTON */
.start-btn {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    border: none;
}

/* Ripple */
.start-btn::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.start-btn:active::after {
    width: 200px;
    height: 200px;
    transition: 0.4s;
}

@keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<h2>📑 Test Series</h2>

<div class="menu-container">

<!-- Chapters 1–20 -->
<script>
for(let i=1;i<=20;i++){
    document.write(`
    <div class="test-box">
        <div class="test-info">
            <i class="fas fa-book test-icon"></i>
            <span class="test-name">Chapter ${i} Test</span>
            <span class="badge">200 MCQ</span>
        </div>
        <a href="test${i}.html" class="start-btn">
            START <i class="fas fa-arrow-right"></i>
        </a>
    </div>
    `);
}
</script>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

document.querySelectorAll('.start-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('medium');
        }
    });
});
</script>

</body>
</html>
