<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Test Series Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f0f13;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f0f13, #1a1a2e, #0f0f13, #16213e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            font-weight: 600;
            font-size: 28px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            animation: fadeInDown 0.8s ease-out;
        }

        .menu-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Test Box Styling */
        .test-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
            position: relative;
            overflow: hidden;
        }

        /* Delay for each box animation */
        .test-box:nth-child(1) { animation-delay: 0.1s; }
        .test-box:nth-child(2) { animation-delay: 0.2s; }
        .test-box:nth-child(3) { animation-delay: 0.3s; }
        .test-box:nth-child(4) { animation-delay: 0.4s; }
        .test-box:nth-child(5) { animation-delay: 0.5s; }
        .test-box:nth-child(6) { animation-delay: 0.6s; }
        .test-box:nth-child(7) { animation-delay: 0.7s; }
        .test-box:nth-child(8) { animation-delay: 0.8s; }
        .test-box:nth-child(9) { animation-delay: 0.9s; }

        .test-box:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .test-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .test-icon {
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .test-name {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Premium Button Styling */
        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
            border: none;
            cursor: pointer;
        }

        .start-btn:hover {
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            transform: translateY(-2px);
        }

        .start-btn:active {
            transform: scale(0.9);
        }

        /* Animations */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating Sticker Animation */
        .sticker {
            position: absolute;
            font-size: 40px;
            opacity: 0.1;
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

    </style>
</head>
<body>

    <div class="sticker" style="top: 10%; left: 5%;">📚</div>
    <div class="sticker" style="bottom: 15%; right: 10%; animation-delay: 2s;">🚀</div>

            <a href="test5.html" class="start-btn">START <i class="fas fa-arrow-right"></i></a>
        </div>

            </div>
            <a href="test6.html" class="start-btn">START <i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="test-box">
            <div class="test-info">
                <i class="fas fa-wind test-icon"></i>
                <span class="test-name">Chapter 7 Test</span>
            </div>
            <a href="test7.html" class="start-btn">START <i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="test-box">
            <div class="test-info">
                <i class="fas fa-cloud-sun test-icon"></i>
                <span class="test-name">Chapter 8 Test</span>
            </div>
            <a href="test8.html" class="start-btn">START <i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="test-box">
            <div class="test-info">
                <i class="fas fa-sun test-icon"></i>

            </div>
            <a href="test9.html" class="start-btn">START <i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="test-box">
            <div class="test-info">
                <i class="fas fa-bolt test-icon"></i>
                <span class="test-name">Chapter 10 Test</span>
            </div>
            <a href="test10.html" class="start-btn">START <i class="fas fa-arrow-right"></i></a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // Haptic Feedback jab button click ho (Telegram Feature)
        document.querySelectorAll('.start-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }
            });
        });
    </script>
</body>
</html>
