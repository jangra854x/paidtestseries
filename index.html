<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Series Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212; /* Dark Mode */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h2 { color: #00d2ff; margin-bottom: 30px; }
        
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .test-box {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .test-name { font-size: 18px; font-weight: 500; }

        .start-btn {
            background: #0088cc;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.2s;
        }

        .start-btn:active {
            background: #006699;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h2>📑 Select Your Test</h2>

    <div class="menu-container">
        <div class="test-box">
            <span class="test-name">Chapter 2 Test</span>
            <a href="test2.html" class="start-btn">Start</a>
        </div>

        <div class="test-box">
            <span class="test-name">Chapter 3 Test</span>
            <a href="test3.html" class="start-btn">Start</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Isse Mini App poori screen par khulega
        tg.ready();
    </script>
</body>
</html>
